<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous">
  <link rel="stylesheet" href="./style/reset.css">
  <link rel="stylesheet" href="./style/root.css">
  <link rel="stylesheet" href="./style/header.css">
  <link rel="stylesheet" href="./style/main.css">
  <title>Ricardo - Portfólio</title>
</head>
<body>
  <header>
    <p class="titulo__header">Ricardo</p>
    <ul class="menu__header">
      <li class="menu_header--item btn-certificados"><a href="#certificados">Certificados</a></li>
      <li class="menu_header--item btn-contato"><a href="">Contato</a></li>
    </ul>
  </header>
  <main>
    <section class="main__inicio">
      <div>
        <h1 class="main_inicio--titulo"><span>Ricardo</span> Portfólio</h1>
        <p class="main_inicio--botao"><a href="">Baixar CV</a></p>
      </div>
      <img class="main_inicio--imagem" src="./assets/Programming-amico.png" alt="Imagem de um garoto programando.">
    </section>
    <section class="main__sobre">
      <h2 class="main_sobre--texto"><span>Ricardo:</span> Estudante de Análise e Desenvolvimento de Sistema e da área de Front-End.</h2>
    </section>
    <section class="main__habilidades">
      <div>
        <h2 class="main_habilidades--titulo">Habilidades</h2>
        <p class="main_habilidades--texto">Essas são algumas das minhas habilidades, sempre tentando aprender e evoluir.</p>
      </div>
      <div class="logos">
        <img class="main_habilidades--logo" src="./assets/logos/icons8-html-480.png" alt="">
        <img class="main_habilidades--logo" src="./assets/logos/icons8-css-480.png" alt="">
        <img class="main_habilidades--logo" src="./assets/logos/icons8-javascript-480.png" alt="">
        <img class="main_habilidades--logo" src="./assets/logos/icons8-bootstrap-480.png" alt="">
        <img class="main_habilidades--logo" src="./assets/logos/logo-canva-png.png" alt="">
      </div>
    </section>
    <section id="certificados" class="main__certificados">
      <h2 class="main_certificados--titulo">Certificados</h2>
      <div id="carouselExample" class="carousel slide">
        <div class="carousel-inner">
          <div class="carousel-item active">
            <img src="./assets/certificados/certificado_trybe.png" class="d-block w-100" alt="...">
          </div>
          <div class="carousel-item">
            <img src="./assets/certificados/alura-1.png" class="d-block w-100" alt="...">
          </div>
          <div class="carousel-item">
            <img src="./assets/certificados/alura - 2.png" class="d-block w-100" alt="...">
          </div>
          <div class="carousel-item">
            <img src="./assets/certificados/alura-3.png" class="d-block w-100" alt="...">
          </div>
          <div class="carousel-item">
            <img src="./assets/certificados/alura-04.png" class="d-block w-100" alt="...">
          </div>
          <div class="carousel-item">
            <img src="./assets/certificados/alura-5.png" class="d-block w-100" alt="...">
          </div>
        </div>
        <div class="btns">
          <button class="carousel-control-prev btn-carousel" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
          </button>
          <button class="carousel-control-next btn-carousel" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
          </button>
        </div>
      </div>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.7/dist/umd/popper.min.js" integrity="sha384-zYPOMqeu1DAVkHiLqWBUTcbYfZ8osu1Nd6Z89ify25QV9guujx43ITvfi12/QExE" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.min.js" integrity="sha384-Y4oOpwW3duJdCWv5ly8SCFYWqFDsfob/3GkgExXKV4idmbt98QcxXYs9UoXAB7BZ" crossorigin="anonymous"></script>
</body>
</html>
